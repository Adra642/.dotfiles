[blur-my-shell]
settings-version=2

[blur-my-shell/appfolder]
brightness=0.59999999999999998
sigma=30

[blur-my-shell/coverflow-alt-tab]
pipeline='pipeline_default'

[blur-my-shell/dash-to-dock]
blur=false
brightness=0.59999999999999998
pipeline='pipeline_default_rounded'
sigma=30
static-blur=true
style-dash-to-dock=0

[blur-my-shell/lockscreen]
pipeline='pipeline_default'

[blur-my-shell/overview]
pipeline='pipeline_default'

[blur-my-shell/panel]
blur=false
brightness=0.59999999999999998
pipeline='pipeline_default'
sigma=30

[blur-my-shell/screenshot]
pipeline='pipeline_default'

[blur-my-shell/window-list]
brightness=0.59999999999999998
sigma=30

[caffeine]
cli-toggle=false
indicator-position-max=1

[dash-to-dock]
apply-custom-theme=true
background-opacity=0.80000000000000004
click-action='focus-minimize-or-previews'
custom-theme-shrink=true
dash-max-icon-size=48
dock-position='LEFT'
height-fraction=0.90000000000000002
intellihide=false
intellihide-mode='FOCUS_APPLICATION_WINDOWS'
isolate-workspaces=true
preferred-monitor=-2
preferred-monitor-by-connector='eDP-1'
scroll-action='cycle-windows'
show-apps-at-top=true
show-icons-notifications-counter=false
show-mounts=false
show-trash=false

[just-perfection]
accessibility-menu=false
animation=3
clock-menu=true
dash-separator=false
events-button=false
quick-settings=true
quick-settings-backlight=false
quick-settings-dark-mode=false
ripple-box=false
startup-status=0
support-notifier-showed-version=36
window-preview-caption=false

[mediacontrols]
show-control-icons-seek-backward=false
show-control-icons-seek-forward=false

[user-theme]
name='Orchis-Dark-Nord'

[vitals]
hot-sensors=['_temperature_processor_0_', '_memory_usage_']
